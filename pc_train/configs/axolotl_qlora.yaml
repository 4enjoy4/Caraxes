# Generated by pc_train/scripts/make_axolotl_config.py
# Install: pip install -r pc_train/requirements-pc-train.txt
# Run:     accelerate launch -m axolotl.cli.train pc_train/configs/axolotl_qlora.yaml

base_model: Qwen/Qwen2.5-Coder-32B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer
trust_remote_code: true

load_in_4bit: true
strict: false

datasets:
  - path: pc_train/data/merged_code_sft.jsonl
    type: chat_template
    field_messages: messages

dataset_prepared_path: pc_train/cache/prepared
output_dir: pc_train/outputs/qlora_run

sequence_len: 8192
sample_packing: true
eval_sample_packing: false
pad_to_sequence_len: true

adapter: qlora
lora_model_dir:
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_linear: true

wandb_project:
wandb_entity:
wandb_name:

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 1.0
optimizer: adamw_bnb_8bit
lr_scheduler: cosine
learning_rate: 2e-5
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0

bf16: auto
tf32: true
flash_attention: true

logging_steps: 10
saves_per_epoch: 2
evals_per_epoch: 2
val_set_size: 0.02
save_total_limit: 3

special_tokens:
  pad_token: <|endoftext|>
