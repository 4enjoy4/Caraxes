<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Caraxes - Activity</title>
    <style>
      :root {
        color-scheme: dark;
        --line: rgba(255, 255, 255, 0.1);
        --text: #f5efe8;
        --muted: #a9a1a0;
        --ember: #ff5d2e;
        --gold: #eeb85f;
        --teal: #35d4c8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        flex-direction: column;
        color: var(--text);
        background:
          linear-gradient(120deg, rgba(155, 29, 36, 0.2), rgba(8, 7, 10, 0.92) 50%),
          url("/static/assets/caraxes-dragon.png") center / cover no-repeat fixed,
          #08070a;
      }
      header {
        display: flex; align-items: center; gap: 14px;
        padding: 12px 18px; border-bottom: 1px solid var(--line);
        background: rgba(13, 11, 16, 0.9); backdrop-filter: blur(8px);
      }
      .brand-mark {
        display: grid; width: 34px; height: 34px; place-items: center;
        border: 1px solid rgba(255, 93, 46, 0.5); border-radius: 8px;
        background: linear-gradient(145deg, rgba(255, 93, 46, 0.24), rgba(53, 212, 200, 0.12));
        color: var(--gold); font-weight: 800;
      }
      h1 { margin: 0; font-size: 17px; }
      h1 small { color: var(--muted); font-weight: 400; font-size: 12px; }
      nav { display: flex; gap: 8px; margin-left: auto; }
      nav a, nav button {
        border: 1px solid var(--line); border-radius: 7px; padding: 7px 13px;
        color: var(--muted); background: rgba(255, 255, 255, 0.04);
        text-decoration: none; font: inherit; font-size: 13px; cursor: pointer;
      }
      nav a:hover, nav button:hover { color: var(--text); border-color: rgba(255, 93, 46, 0.4); }
      .filters {
        display: flex; flex-wrap: wrap; gap: 8px;
        max-width: 860px; width: 100%; margin: 16px auto 0; padding: 0 18px;
      }
      .filters button {
        border: 1px solid var(--line); border-radius: 999px; padding: 6px 14px;
        color: var(--muted); background: rgba(13, 11, 16, 0.8); font: inherit; font-size: 12.5px; cursor: pointer;
      }
      .filters button.active {
        border-color: transparent; color: #160b08; font-weight: 700;
        background: linear-gradient(135deg, var(--ember), var(--gold));
      }
      main {
        flex: 1; min-height: 0; overflow-y: auto;
        scrollbar-width: thin; scrollbar-color: rgba(238, 184, 95, 0.45) transparent;
      }
      .feed { max-width: 860px; margin: 0 auto; padding: 14px 18px 40px; }
      .day-sep {
        margin: 18px 0 10px; color: var(--muted); font-size: 11.5px;
        font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; text-align: center;
      }
      .item {
        display: grid; grid-template-columns: 40px minmax(0, 1fr); gap: 12px;
        margin-bottom: 10px;
      }
      .avatar {
        display: grid; width: 38px; height: 38px; place-items: center;
        border-radius: 999px; color: #160b08; font-weight: 800; font-size: 15px;
      }
      .bubble {
        border: 1px solid var(--line); border-radius: 11px; padding: 10px 13px;
        background: rgba(17, 16, 22, 0.88); font-size: 13.5px; line-height: 1.55;
        overflow-wrap: anywhere;
      }
      .bubble .head { display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; margin-bottom: 2px; }
      .bubble .name { font-weight: 700; }
      .bubble .time { color: var(--muted); font-size: 11.5px; }
      .bubble .kind {
        border-radius: 5px; padding: 1px 7px; font-size: 10.5px; font-weight: 700;
        letter-spacing: 0.04em; text-transform: uppercase;
      }
      .kind.coder { color: #8df4e8; background: rgba(53, 212, 200, 0.12); }
      .kind.chat { color: #ffd9a8; background: rgba(238, 184, 95, 0.14); }
      .kind.auth { color: #d8c9ff; background: rgba(160, 130, 255, 0.14); }
      .bubble .detail { color: var(--text); }
      .bubble .meta { margin-top: 3px; color: var(--muted); font-size: 11.5px; }
      .bubble code {
        padding: 1px 5px; border-radius: 4px; color: #8df4e8;
        background: rgba(53, 212, 200, 0.1);
        font-family: "Cascadia Code", Consolas, monospace; font-size: 0.92em;
      }
      .empty { padding: 60px 0; color: var(--muted); text-align: center; }
    </style>
  </head>
  <body>
    <header>
      <div class="brand-mark">C</div>
      <h1>Activity <small>- who did what, newest first</small></h1>
      <nav>
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
        <a href="/coder">Coder</a>
        <button id="logoutBtn" type="button">Log out</button>
      </nav>
    </header>
    <div class="filters" id="filters">
      <button data-kind="" class="active" type="button">All</button>
      <button data-kind="coder" type="button">Coder</button>
      <button data-kind="chat" type="button">Chat</button>
      <button data-kind="auth" type="button">Sign-ins</button>
    </div>
    <main><div class="feed" id="feed"><div class="empty">Loading...</div></div></main>
    <script>
      let kindFilter = "";
      const AVATAR_COLORS = ["#ff5d2e", "#eeb85f", "#35d4c8", "#e86aa6", "#8fd35d", "#7aa7ff", "#c98bff"];

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;").replaceAll("'", "&#039;");
      }
      function avatarColor(name) {
        let hash = 0;
        for (const ch of name) hash = (hash * 31 + ch.charCodeAt(0)) >>> 0;
        return AVATAR_COLORS[hash % AVATAR_COLORS.length];
      }
      function kindClass(kind) {
        if (kind.startsWith("coder")) return "coder";
        if (kind.startsWith("chat")) return "chat";
        return "auth";
      }
      function kindLabel(kind) {
        return { "coder.save": "saved", "coder.create": "created", "coder.delete": "deleted",
                 "coder.rename": "renamed", "coder.run": "command", "coder.ai_write": "AI wrote",
                 "coder.workspace": "workspace", "chat.message": "chat", "auth.login": "signed in",
                 "auth.register": "new user" }[kind] || kind.split(".")[0];
      }
      function dayOf(iso) {
        return new Date(iso).toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });
      }
      function render(items) {
        const feed = document.querySelector("#feed");
        if (!items.length) {
          feed.innerHTML = '<div class="empty">Nothing here yet - edits, commands, and chats will appear as they happen.</div>';
          return;
        }
        let html = "";
        let lastDay = "";
        for (const item of items) {
          const day = dayOf(item.created_at);
          if (day !== lastDay) {
            html += `<div class="day-sep">${escapeHtml(day)}</div>`;
            lastDay = day;
          }
          const name = item.username || "someone";
          const time = new Date(item.created_at).toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
          const workspace = item.workspace ? item.workspace.split(/[\\/]/).filter(Boolean).pop() : "";
          html += `
            <div class="item">
              <div class="avatar" style="background:${avatarColor(name)}">${escapeHtml(name[0].toUpperCase())}</div>
              <div class="bubble">
                <div class="head">
                  <span class="name">${escapeHtml(name)}</span>
                  <span class="kind ${kindClass(item.kind)}">${escapeHtml(kindLabel(item.kind))}</span>
                  <span class="time">${escapeHtml(time)}</span>
                </div>
                <div class="detail">${escapeHtml(item.detail)}</div>
                ${item.path || workspace
                  ? `<div class="meta">${item.path ? `<code>${escapeHtml(item.path)}</code>` : ""}${workspace ? ` in ${escapeHtml(workspace)}` : ""}</div>`
                  : ""}
              </div>
            </div>`;
        }
        feed.innerHTML = html;
      }
      async function load() {
        try {
          const response = await fetch(`/api/activity?limit=200${kindFilter ? `&kind=${kindFilter}` : ""}`);
          if (response.status === 401) { window.location.href = "/login"; return; }
          render(await response.json());
        } catch (error) {
          document.querySelector("#feed").innerHTML = `<div class="empty">${escapeHtml(error.message)}</div>`;
        }
      }
      document.querySelector("#filters").addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        document.querySelectorAll("#filters button").forEach((b) => b.classList.toggle("active", b === button));
        kindFilter = button.dataset.kind;
        load();
      });
      document.querySelector("#logoutBtn").addEventListener("click", async () => {
        await fetch("/api/auth/logout", { method: "POST" });
        window.location.href = "/login";
      });
      load();
      setInterval(load, 5000);
    </script>
  </body>
</html>
