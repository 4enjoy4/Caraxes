<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Caraxes - Sign in</title>
    <style>
      :root {
        color-scheme: dark;
        --line: rgba(255, 255, 255, 0.1);
        --text: #f5efe8;
        --muted: #a9a1a0;
        --ember: #ff5d2e;
        --gold: #eeb85f;
        --teal: #35d4c8;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        padding: 20px;
        color: var(--text);
        background:
          linear-gradient(120deg, rgba(155, 29, 36, 0.3), rgba(8, 7, 10, 0.86) 55%),
          url("/static/assets/caraxes-dragon.png") center / cover no-repeat fixed,
          #08070a;
      }
      .card {
        width: min(420px, 94vw);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 26px;
        background: rgba(13, 11, 16, 0.88);
        backdrop-filter: blur(8px);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.6);
      }
      .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
      .brand-mark {
        display: grid; width: 42px; height: 42px; place-items: center;
        border: 1px solid rgba(255, 93, 46, 0.5); border-radius: 9px;
        background: linear-gradient(145deg, rgba(255, 93, 46, 0.24), rgba(53, 212, 200, 0.12));
        color: var(--gold); font-weight: 800; font-size: 17px;
      }
      h1 { margin: 0; font-size: 20px; }
      .brand p { margin: 0; color: var(--muted); font-size: 12px; }
      .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 16px; }
      .tabs button {
        border: 1px solid var(--line); border-radius: 8px; padding: 9px;
        color: var(--muted); background: rgba(255, 255, 255, 0.04); font: inherit; cursor: pointer;
      }
      .tabs button.active {
        border-color: transparent; color: #160b08; font-weight: 800;
        background: linear-gradient(135deg, var(--ember), var(--gold));
      }
      label { display: grid; gap: 5px; margin-bottom: 12px; color: var(--muted); font-size: 12.5px; }
      input {
        border: 1px solid var(--line); border-radius: 8px; padding: 11px 12px;
        color: var(--text); background: rgba(25, 27, 36, 0.94); font: inherit; outline: none;
      }
      input:focus { border-color: rgba(255, 93, 46, 0.5); box-shadow: 0 0 0 3px rgba(255, 93, 46, 0.12); }
      .submit {
        width: 100%; margin-top: 4px; border: 0; border-radius: 8px; padding: 12px;
        color: #160b08; background: linear-gradient(135deg, var(--ember), var(--gold));
        font: inherit; font-weight: 800; cursor: pointer;
      }
      .submit:disabled { opacity: 0.6; cursor: default; }
      .error { min-height: 18px; margin: 10px 0 0; color: #ff8f70; font-size: 13px; text-align: center; }
      .hint { margin: 14px 0 0; color: var(--muted); font-size: 12px; text-align: center; line-height: 1.5; }
      #displayNameField { display: none; }
      body.register #displayNameField { display: grid; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="brand">
        <div class="brand-mark">C</div>
        <div>
          <h1>Caraxes</h1>
          <p>Local AI forge - sign in to continue</p>
        </div>
      </div>
      <div class="tabs">
        <button id="tabLogin" class="active" type="button">Sign in</button>
        <button id="tabRegister" type="button">Create account</button>
      </div>
      <form id="form">
        <label>Username
          <input id="username" type="text" autocomplete="username" spellcheck="false" required minlength="2" maxlength="32" />
        </label>
        <label id="displayNameField">Display name (shown in the activity feed)
          <input id="displayName" type="text" maxlength="48" />
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password" required minlength="4" maxlength="128" />
        </label>
        <button id="submitBtn" class="submit" type="submit">Sign in</button>
        <p id="error" class="error"></p>
      </form>
      <p class="hint">Accounts live only on this PC. Each user gets their own private chat history;
        file changes are tracked with your name in the activity feed.</p>
    </div>
    <script>
      let mode = "login";
      const form = document.querySelector("#form");
      const errorEl = document.querySelector("#error");
      const submitBtn = document.querySelector("#submitBtn");
      function setMode(next) {
        mode = next;
        document.body.classList.toggle("register", mode === "register");
        document.querySelector("#tabLogin").classList.toggle("active", mode === "login");
        document.querySelector("#tabRegister").classList.toggle("active", mode === "register");
        submitBtn.textContent = mode === "login" ? "Sign in" : "Create account";
        errorEl.textContent = "";
      }
      document.querySelector("#tabLogin").addEventListener("click", () => setMode("login"));
      document.querySelector("#tabRegister").addEventListener("click", () => setMode("register"));
      const requestedMode = new URLSearchParams(window.location.search).get("mode");
      if (requestedMode === "register") setMode("register");
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorEl.textContent = "";
        submitBtn.disabled = true;
        const payload = {
          username: document.querySelector("#username").value.trim(),
          password: document.querySelector("#password").value,
        };
        if (mode === "register") payload.display_name = document.querySelector("#displayName").value.trim();
        try {
          const response = await fetch(`/api/auth/${mode === "login" ? "login" : "register"}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!response.ok) {
            let detail = response.statusText;
            try { detail = (await response.json()).detail; } catch (e) {}
            throw new Error(Array.isArray(detail) ? "Check the username and password rules" : detail);
          }
          window.location.href = "/";
        } catch (error) {
          errorEl.textContent = error.message;
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
